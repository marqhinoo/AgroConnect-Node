<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroConnect | Estación Meteorológica</title>
    
    <link rel="manifest" href="/manifest.json?v=2">
    <link rel="icon" type="image/png" href="/logo.png?v=2">
    <meta name="theme-color" content="#22c55e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/logo.png?v=2">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #05070a; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-green { text-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        .neon-blue { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        canvas { cursor: crosshair !important; touch-action: manipulation; }
        /* Ocultar scrollbar en los badges si hay desborde en móvil */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <header class="p-4 md:p-6 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            
            <div class="flex items-center gap-3 w-full md:w-auto">
                <img src="/logo.png?v=2" alt="Logo" class="h-10 w-10 md:h-12 md:w-12 rounded-full border border-green-500/30 shadow-[0_0_15px_rgba(34,197,94,0.2)]">
                <div>
                    <h1 class="text-xl md:text-2xl font-black tracking-tighter neon-green text-green-500 leading-none">AGROCONNECT</h1>
                    <p class="text-[8px] md:text-[10px] tracking-[0.2em] md:tracking-[0.3em] text-slate-500 uppercase font-bold">Agriculture Node v1</p>
                </div>
            </div>
            
            <div class="flex gap-2 md:gap-4 items-center overflow-x-auto no-scrollbar w-full md:w-auto justify-center md:justify-end text-[9px] md:text-[10px] font-bold">
                <div id="wifi-badge" class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10 text-slate-400 whitespace-nowrap">
                    WIFI <div id="wifi-dot" class="h-1.5 w-1.5 bg-slate-600 rounded-full"></div>
                </div>
                <div id="lora-badge" class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10 text-slate-400 whitespace-nowrap">
                    LORA <div id="lora-dot" class="h-1.5 w-1.5 bg-slate-600 rounded-full"></div>
                </div>
                <div class="flex items-center gap-2 text-green-400 bg-green-500/5 px-3 py-1.5 rounded-full border border-green-500/10">
                    <span id="header-bat" class="whitespace-nowrap">0.00V</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 space-y-6">

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass p-8 rounded-[2rem] flex flex-col justify-between border-t-2 border-green-500/20">
                <h3 class="text-slate-500 text-xs font-black uppercase tracking-widest">Estrés (VPD)</h3>
                <div class="flex items-baseline gap-3 my-4">
                    <span class="text-7xl font-black text-white tracking-tighter" id="val-vpd">0.00</span>
                    <span class="text-xl text-green-500 font-mono">kPa</span>
                </div>
                <p id="val-status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-white/5 p-2 rounded-lg text-center italic">Sincronizando...</p>
            </div>

            <div class="glass p-8 rounded-[2rem] lg:col-span-2 min-h-[300px]">
                <h3 class="text-slate-500 text-xs font-black uppercase tracking-widest mb-6 text-center">Histórico Suelo (%)</h3>
                <div class="h-48">
                    <canvas id="soilChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-[1.5rem] border-l-2 border-blue-500/50">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-1">Temperatura Aire</p>
                <div class="text-3xl font-bold" id="val-temp-aire">0.0<span class="text-sm text-slate-500 ml-1">°C</span></div>
            </div>
            <div class="glass p-6 rounded-[1.5rem] border-l-2 border-cyan-500/50">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-1">Humedad Aire</p>
                <div class="text-3xl font-bold" id="val-hum-aire">0<span class="text-sm text-slate-500 ml-1">%</span></div>
            </div>
            <div class="glass p-6 rounded-[1.5rem] border-l-2 border-purple-500/50">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-1">Presión Atmosférica</p>
                <div class="text-3xl font-bold" id="val-presion">0<span class="text-sm text-slate-500 ml-1">hPa</span></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-[1.5rem]">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-1 text-blue-400">Humedad 15cm</p>
                <div class="text-2xl font-bold" id="val-hum15">0%</div>
            </div>
            <div class="glass p-6 rounded-[1.5rem]">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-1 text-indigo-400">Humedad 40cm</p>
                <div class="text-2xl font-bold" id="val-hum40">0%</div>
            </div>
            <div class="glass p-6 rounded-[1.5rem]">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-1">Temp. Suelo</p>
                <div class="text-2xl font-bold" id="val-temp-suelo">0.0°C</div>
            </div>
        </div>
    </main>

    <script>
        let myChart;
        const ctx = document.getElementById('soilChart').getContext('2d');

        function initChart() {
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: '15cm', data: [], borderColor: '#3b82f6', tension: 0.4, borderWidth: 3, pointRadius: 0, pointHoverRadius: 6 },
                        { label: '40cm', data: [], borderColor: '#818cf8', tension: 0.4, borderWidth: 3, pointRadius: 0, pointHoverRadius: 6 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false, axis: 'x' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            enabled: true,
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            padding: 12,
                            cornerRadius: 10
                        }
                    },
                    scales: {
                        y: { min: 0, max: 100, ticks: { color: '#475569' }, grid: { color: 'rgba(255, 255, 255, 0.05)' } },
                        x: { ticks: { color: '#475569' }, grid: { display: false } }
                    }
                }
            });
        }

        async function refrescarDashboard() {
            try {
                const respuesta = await fetch('/api/datos');
                const historial = await respuesta.json();
                if (historial.length > 0) {
                    const ult = historial[0];
                    document.getElementById('val-vpd').innerText = ult.vpd || "0.00";
                    document.getElementById('val-temp-aire').innerHTML = `${ult.tempAire || 0}<span class="text-sm text-slate-500 ml-1">°C</span>`;
                    document.getElementById('val-hum-aire').innerHTML = `${ult.humAire || 0}<span class="text-sm text-slate-500 ml-1">%</span>`;
                    document.getElementById('val-presion').innerHTML = `${ult.presion || 0}<span class="text-sm text-slate-500 ml-1">hPa</span>`;
                    document.getElementById('val-hum15').innerText = (ult.hum15 || 0) + "%";
                    document.getElementById('val-hum40').innerText = (ult.hum40 || 0) + "%";
                    document.getElementById('val-temp-suelo').innerText = (ult.tempSuelo || 0) + "°C";
                    document.getElementById('header-bat').innerText = (ult.bateria || "0.00") + "V";

                    document.getElementById('wifi-dot').className = `h-1.5 w-1.5 rounded-full ${ult.wifiCon === 1 ? 'bg-green-500 shadow-[0_0_5px_#22c55e]' : 'bg-red-500'}`;
                    document.getElementById('lora-dot').className = `h-1.5 w-1.5 rounded-full ${ult.loraCon === 1 ? 'bg-blue-500 shadow-[0_0_5px_#3b82f6]' : 'bg-red-500'}`;

                    const historialGrafico = [...historial].slice(0, 15).reverse();
                    myChart.data.labels = historialGrafico.map(d => d.hora);
                    myChart.data.datasets[0].data = historialGrafico.map(d => d.hum15);
                    myChart.data.datasets[1].data = historialGrafico.map(d => d.hum40);
                    myChart.update('none'); 
                }
            } catch (error) { console.error("Error:", error); }
        }

        initChart();
        setInterval(refrescarDashboard, 5000);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error:', err));
            });
        }
    </script>
</body>
</html>
